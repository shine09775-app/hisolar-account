<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi Solar — ประวัติ Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6">
    <span class="font-bold text-yellow-500 text-lg">☀ Hi Solar</span>
    <a href="index.html"    class="text-sm text-gray-500 hover:text-gray-800">Dashboard</a>
    <a href="internal-transfers.html" class="text-sm text-gray-500 hover:text-gray-800">โอนระหว่างบัญชี</a>
    <a href="upload.html"   class="text-sm text-gray-500 hover:text-gray-800">Upload</a>
    <a href="history.html"  class="text-sm text-yellow-600 font-semibold border-b-2 border-yellow-400 pb-1">Upload Log</a>
    <a href="maintain.html" class="text-sm text-gray-500 hover:text-gray-800">ข้อมูลรายการ</a>
    <a href="contacts.html" class="text-sm text-gray-500 hover:text-gray-800">สมุดรายชื่อ</a>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">ประวัติการ Upload</h1>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <table class="min-w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">วันที่ Upload</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ชื่อไฟล์</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">บัญชี</th>
            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">รายการทั้งหมด</th>
            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">เพิ่มใหม่</th>
            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">ข้ามซ้ำ</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="6" class="text-center py-12 text-gray-400">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.guard()

      const { data, error } = await db
        .from('upload_logs')
        .select('*')
        .order('uploaded_at', { ascending: false })
        .limit(100)

      const tbody = document.getElementById('history-tbody')

      if (error || !data?.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-400">ยังไม่มีประวัติ Upload</td></tr>'
        return
      }

      tbody.innerHTML = data.map(row => {
        const dt = new Date(row.uploaded_at)
        const dateStr = dt.toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' })
        const timeStr = dt.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' })
        return `<tr class="border-t border-gray-100 hover:bg-gray-50">
          <td class="px-4 py-3 text-gray-600">${dateStr} ${timeStr}</td>
          <td class="px-4 py-3 font-medium text-gray-800 max-w-xs truncate">${row.filename}</td>
          <td class="px-4 py-3 text-gray-600">${row.account || '—'}</td>
          <td class="px-4 py-3 text-right text-gray-700">${row.rows_total?.toLocaleString('th-TH')}</td>
          <td class="px-4 py-3 text-right text-green-600 font-semibold">${row.rows_inserted?.toLocaleString('th-TH')}</td>
          <td class="px-4 py-3 text-right text-gray-400">${row.rows_skipped?.toLocaleString('th-TH')}</td>
        </tr>`
      }).join('')
    })
  </script>
</body>
</html>
